
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pace Me</title>
<style>
:root{--bg:#1a1a1a;--surface:#222;--border:#2e2e2e;--bl:#383838;--text:#f0f0f0;--muted:#555;--muted2:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Helvetica,Arial,sans-serif;min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:40px 28px 60px}
header{margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{font-size:18px;color:#fff;letter-spacing:.04em;white-space:nowrap}
.brand em{font-style:normal;color:#fff}
.tabs{display:flex;border:1px solid var(--bl);border-radius:3px;overflow:hidden;flex-shrink:0}
.tab{padding:7px 14px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:var(--muted2);border:none;cursor:pointer;transition:all .15s;font-family:Helvetica,Arial,sans-serif}
.tab.active{background:var(--bl);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.page{display:none}
.page.active{display:block}

/* PAGE 1 */
.pace-control{margin-bottom:28px}
.pace-row{display:flex;align-items:baseline;gap:16px;margin-bottom:16px}
.pace-value{font-size:68px;color:#fff;line-height:1;letter-spacing:-.02em}
.pace-meta{display:flex;flex-direction:column;gap:4px;padding-bottom:4px}
.pace-unit{font-size:12px;color:#fff;letter-spacing:.15em}
.pace-speed{font-size:15px;color:#fff;letter-spacing:.02em}
.slider-row{display:flex;align-items:center;gap:12px}
.btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--bl);background:transparent;color:var(--muted2);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;font-family:Helvetica,Arial,sans-serif}
.btn:hover{border-color:#555;color:var(--text)}
.btn:active{transform:scale(.9)}
.slider-wrap{flex:1}
input[type=range]{-webkit-appearance:none;width:100%;height:1px;background:linear-gradient(90deg,#d0d0d0 var(--pct,0%),var(--bl) var(--pct,0%));outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:grab;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.25)}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px;letter-spacing:.08em}
.splits-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 1px;background:var(--border);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.splits-col{background:var(--surface)}
.col-header{display:flex;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.split-row{display:flex;justify-content:space-between;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.split-row:last-child{border-bottom:none}
.split-row:hover{background:rgba(255,255,255,.03)}
.split-dist{font-size:13px;color:var(--muted2);letter-spacing:.02em}
.split-time{font-size:14px;color:var(--text);letter-spacing:.04em}
.split-row.key .split-dist{color:#999}
.split-row.key .split-time{color:#fff}
.split-row.race .split-dist{color:#999}
.split-row.race .split-time{color:#fff}

/* Custom distance block */
.custom-dist-block{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.custom-dist-block label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.custom-dist-input{background:var(--bg);border:1px solid var(--bl);color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:20px;width:90px;text-align:center;padding:8px 6px;border-radius:3px;-moz-appearance:textfield}
.custom-dist-input::-webkit-inner-spin-button,.custom-dist-input::-webkit-outer-spin-button{-webkit-appearance:none}
.custom-dist-input:focus{outline:none;border-color:#888}
.custom-dist-unit{font-size:14px;color:var(--muted2)}
.custom-dist-result{font-size:20px;color:#fff;letter-spacing:.02em;margin-left:auto}

/* PAGE 2 */
.pred-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.ref-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:24px}
.ref-btn{background:var(--surface);border:none;padding:16px 8px;text-align:center;cursor:pointer;transition:background .15s;font-family:Helvetica,Arial,sans-serif;color:#fff;font-size:15px}
.ref-btn:hover{background:var(--bl)}
.ref-btn.active{background:var(--bl)}
.time-block{margin-bottom:24px}
.time-fields{display:flex;align-items:center;gap:8px}
input[type=number]{background:var(--surface);border:1px solid var(--bl);color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:28px;width:62px;text-align:center;padding:8px 4px;border-radius:3px;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{outline:none;border-color:#888}
.time-sep{font-size:28px;color:var(--muted2)}
.method-note{font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:20px}
.pred-table{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.pred-thead{display:grid;grid-template-columns:1.2fr 1fr 1fr;background:var(--bg);border-bottom:1px solid var(--border)}
.pred-th{padding:10px 20px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.pred-tr{display:grid;grid-template-columns:1.2fr 1fr 1fr;border-bottom:1px solid var(--border);transition:background .1s}
.pred-tr:last-child{border-bottom:none}
.pred-tr:hover{background:rgba(255,255,255,.03)}
.pred-td{padding:11px 20px;font-size:13px;letter-spacing:.04em}
.pred-td.dist{font-size:12px;color:var(--muted2)}
.pred-td.time{color:var(--text)}
.pred-td.pace{font-size:12px;color:var(--muted2)}

/* PAGE 3 - Workout Builder */
.workout-summary{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:20px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px}
.summary-item{text-align:center}
.summary-val{font-size:32px;color:#fff;letter-spacing:-.01em;line-height:1.2}
.summary-lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.blocks-control{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.blocks-control label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.blocks-count{display:flex;align-items:center;gap:0;border:1px solid var(--bl);border-radius:3px;overflow:hidden}
.blocks-count .bcbtn{width:36px;height:36px;background:transparent;border:none;color:var(--muted2);font-size:18px;cursor:pointer;transition:all .15s;font-family:Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center}
.blocks-count .bcbtn:hover{background:var(--bl);color:#fff}
.blocks-count .bcval{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;border-left:1px solid var(--bl);border-right:1px solid var(--bl)}
.workout-blocks{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.workout-block{background:var(--surface);display:grid;grid-template-columns:auto 1fr 1fr auto;align-items:center;gap:0;padding:0}
.wb-num{padding:12px 14px;font-size:11px;color:var(--muted);letter-spacing:.08em;min-width:40px;text-align:center}
.wb-field{display:flex;align-items:center;gap:6px;padding:10px 14px;border-left:1px solid var(--border)}
.wb-field label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.wb-input{background:var(--bg);border:1px solid var(--bl);color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:16px;width:64px;text-align:center;padding:6px 4px;border-radius:3px;-moz-appearance:textfield}
.wb-input::-webkit-inner-spin-button,.wb-input::-webkit-outer-spin-button{-webkit-appearance:none}
.wb-input:focus{outline:none;border-color:#888}
.wb-input-sm{width:36px;font-size:16px}
.wb-sep{font-size:16px;color:var(--muted2)}
.wb-time{padding:12px 14px;border-left:1px solid var(--border);font-size:14px;color:#fff;letter-spacing:.04em;text-align:right;min-width:90px}

@keyframes fn{0%{opacity:.3}100%{opacity:1}}
.flash{animation:fn .2s ease}

@media(max-width:600px){
  .container{padding:24px 10px 40px}
  .pace-value{font-size:52px}
  .col-header{padding:8px 10px;font-size:8px;letter-spacing:.1em}
  .split-row{padding:9px 10px}
  .split-dist,.split-time{font-size:11px}
  .ref-grid{grid-template-columns:repeat(2,1fr)}
  .pred-thead,.pred-tr{grid-template-columns:1fr 1fr 1fr}
  .pred-th{padding:8px 8px;font-size:8px;letter-spacing:.08em}
  .pred-td{padding:9px 8px;font-size:11px}
  .pred-td.dist,.pred-td.pace{font-size:10px}
  header{flex-direction:column;align-items:flex-start;gap:12px}
  input[type=number]{font-size:22px;width:52px;padding:6px 2px}
  .time-sep{font-size:22px}
  .custom-dist-block{padding:14px;gap:10px}
  .custom-dist-input{font-size:16px;width:72px}
  .custom-dist-result{font-size:16px;margin-left:0}
  .workout-block{grid-template-columns:auto 1fr 1fr auto}
  .wb-field{padding:8px 8px;gap:4px}
  .wb-field label{font-size:7px}
  .wb-input{font-size:14px;width:50px;padding:5px 2px}
  .wb-input-sm{width:30px;font-size:14px}
  .wb-num{padding:8px 8px;min-width:30px;font-size:10px}
  .wb-time{padding:8px 8px;font-size:12px;min-width:70px}
  .summary-val{font-size:24px}
  .tabs{flex-wrap:wrap}
  .tab{padding:7px 10px;font-size:10px;letter-spacing:.08em}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">Pace Me <em>/ Built by Tom N.</em></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('splits')">Splits</button>
      <button class="tab" onclick="showTab('predict')">Predict</button>
      <button class="tab" onclick="showTab('workout')">Workout</button>
    </div>
  </header>

  <!-- PAGE 1 : SPLITS -->
  <div id="page-splits" class="page active">
    <div class="pace-control">
      <div class="pace-row">
        <div class="pace-value" id="pd">4:00</div>
        <div class="pace-meta">
          <div class="pace-unit">Min / Km</div>
          <div class="pace-speed" id="ps">15.0 km/h</div>
        </div>
      </div>
      <div class="slider-row">
        <button class="btn" id="bm">&#8722;</button>
        <div class="slider-wrap">
          <input type="range" id="sl" min="150" max="360" value="240" step="1">
          <div class="range-labels"><span>2:30 /km</span><span>6:00 /km</span></div>
        </div>
        <button class="btn" id="bp">&#43;</button>
      </div>
    </div>
    <div class="splits-grid">
      <div class="splits-col">
        <div class="col-header"><span>Distance</span><span>Split</span></div>
        <div id="cL"></div>
      </div>
      <div class="splits-col">
        <div class="col-header"><span>Distance</span><span>Split</span></div>
        <div id="cR"></div>
      </div>
    </div>

    <div class="custom-dist-block">
      <label>Distance personnalisée</label>
      <input type="text" class="custom-dist-input" id="custom-km" placeholder="12.5" oninput="updCustom()">
      <span class="custom-dist-unit">km</span>
      <div class="custom-dist-result" id="custom-result">—</div>
    </div>
  </div>

  <!-- PAGE 2 : PREDICT -->
  <div id="page-predict" class="page">
    <div class="pred-label">Reference distance</div>
    <div class="ref-grid">
      <button class="ref-btn active" id="rb-5"    onclick="setRef('5')">5 km</button>
      <button class="ref-btn"        id="rb-10"   onclick="setRef('10')">10 km</button>
      <button class="ref-btn"        id="rb-half" onclick="setRef('half')">1/2 Marathon</button>
      <button class="ref-btn"        id="rb-full" onclick="setRef('full')">Marathon</button>
    </div>
    <div class="pred-label">Your reference time</div>
    <div class="time-block">
      <div class="time-fields">
        <input type="number" id="inp-h" min="0" max="9"  value="0"  oninput="calcPredict()">
        <span class="time-sep">h</span>
        <input type="number" id="inp-m" min="0" max="59" value="25" oninput="calcPredict()">
        <span class="time-sep">m</span>
        <input type="number" id="inp-s" min="0" max="59" value="0"  oninput="calcPredict()">
        <span class="time-sep">s</span>
      </div>
    </div>
    <div class="method-note">Predictions based on Jack Daniels vDot method</div>
    <div class="pred-table">
      <div class="pred-thead">
        <div class="pred-th">Distance</div>
        <div class="pred-th">Estimated Time</div>
        <div class="pred-th">Min / Km</div>
      </div>
      <div id="pred-body"></div>
    </div>
  </div>

  <!-- PAGE 3 : WORKOUT -->
  <div id="page-workout" class="page">
    <div class="workout-summary">
      <div class="summary-item">
        <div class="summary-val" id="ws-time">0'00"</div>
        <div class="summary-lbl">Temps total</div>
      </div>
      <div class="summary-item">
        <div class="summary-val" id="ws-dist">0.0 km</div>
        <div class="summary-lbl">Distance</div>
      </div>
      <div class="summary-item">
        <div class="summary-val" id="ws-pace">—</div>
        <div class="summary-lbl">Allure moy.</div>
      </div>
    </div>

    <div class="blocks-control">
      <label>Nombre de blocs</label>
      <div class="blocks-count">
        <button class="bcbtn" onclick="changeBlocks(-1)">&#8722;</button>
        <div class="bcval" id="bc-val">3</div>
        <button class="bcbtn" onclick="changeBlocks(1)">&#43;</button>
      </div>
    </div>

    <div class="workout-blocks" id="wb-container"></div>
  </div>

</div>
<script>
/* ---- Utilities ---- */
function ft(s){
  s=Math.round(s);
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h>0) return h+'h'+String(m).padStart(2,'0')+"'"+String(sc).padStart(2,'0')+'"';
  return m+"'"+String(sc).padStart(2,'0')+'"';
}
function fp(s){
  var m=Math.floor(s/60),sc=Math.round(s%60);
  if(sc===60){m++;sc=0;}
  return m+':'+String(sc).padStart(2,'0');
}

/* ---- Tab switching ---- */
function showTab(name){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.remove('active');
    if(t.getAttribute('onclick').indexOf(name)>-1) t.classList.add('active');
  });
  document.getElementById('page-'+name).classList.add('active');
}

/* =============== PAGE 1 : SPLITS =============== */
var LD=[
  {l:'100m', m:100},
  {l:'200m', m:200},
  {l:'300m', m:300},
  {l:'400m', m:400,  c:'key'},
  {l:'500m', m:500},
  {l:'600m', m:600},
  {l:'800m', m:800,  c:'key'},
  {l:'1200m',m:1200},
  {l:'1400m',m:1400},
  {l:'1500m',m:1500, c:'key'},
  {l:'1600m',m:1600, c:'key'},
  {l:'1800m',m:1800}
];
var RD=[
  {l:'2 km',        m:2000},
  {l:'3 km',        m:3000},
  {l:'4 km',        m:4000},
  {l:'5 km',        m:5000,    c:'key'},
  {l:'10 km',       m:10000,   c:'race'},
  {l:'15 km',       m:15000,   c:'race'},
  {l:'20 km',       m:20000,   c:'race'},
  {l:'1/2 Marathon',m:21097.5, c:'race'},
  {l:'25 km',       m:25000,   c:'race'},
  {l:'30 km',       m:30000,   c:'race'},
  {l:'35 km',       m:35000,   c:'race'},
  {l:'40 km',       m:40000,   c:'race'},
  {l:'Marathon',    m:42195,   c:'race'}
];
var sl=document.getElementById('sl');
var pd=document.getElementById('pd');
var ps=document.getElementById('ps');
function bc(el,dists,pace){
  el.innerHTML=dists.map(function(d){
    var c=d.c||'';
    return '<div class="split-row '+c+'"><span class="split-dist">'+d.l+'</span><span class="split-time">'+ft((pace/1000)*d.m)+'</span></div>';
  }).join('');
}
function upd(){
  var s=parseInt(sl.value);
  sl.style.setProperty('--pct',((s-150)/(360-150)*100)+'%');
  pd.textContent=fp(s);
  pd.classList.remove('flash');void pd.offsetWidth;pd.classList.add('flash');
  ps.textContent=(3600/s).toFixed(1)+' km/h';
  bc(document.getElementById('cL'),LD,s);
  bc(document.getElementById('cR'),RD,s);
  updCustom();
}
function updCustom(){
  var raw=document.getElementById('custom-km').value.replace(',','.');
  var km=parseFloat(raw);
  var el=document.getElementById('custom-result');
  if(!km||km<=0){el.textContent='—';return;}
  var pace=parseInt(sl.value);
  var sec=pace*km;
  el.textContent=ft(sec);
}
sl.addEventListener('input',upd);
document.getElementById('bm').addEventListener('click',function(){if(+sl.value>+sl.min){sl.value=+sl.value-1;upd();}});
document.getElementById('bp').addEventListener('click',function(){if(+sl.value<+sl.max){sl.value=+sl.value+1;upd();}});
document.addEventListener('keydown',function(e){
  if(document.activeElement&&(document.activeElement.tagName==='INPUT'))return;
  if(e.key==='ArrowLeft'||e.key==='ArrowDown'){if(+sl.value>+sl.min){sl.value=+sl.value-1;upd();}}
  if(e.key==='ArrowRight'||e.key==='ArrowUp'){if(+sl.value<+sl.max){sl.value=+sl.value+1;upd();}}
});
upd();

/* =============== PAGE 2 : PREDICT (vDot) =============== */
function vo2(v){ return -4.60+0.182258*v+0.000104*v*v; }
function frac(t){ return 0.8+0.1894393*Math.exp(-0.012778*t)+0.2989558*Math.exp(-0.1932605*t); }
function getVdot(distM,timeSec){
  var t=timeSec/60,v=distM/t;
  return vo2(v)/frac(t);
}
function predictSec(vdot,distM){
  var lo=0.5,hi=600.0;
  for(var i=0;i<80;i++){
    var mid=(lo+hi)/2,v=distM/mid;
    if(vo2(v)/frac(mid)>vdot) lo=mid; else hi=mid;
  }
  return Math.round((lo+hi)/2*60);
}
var REFS={'5':{m:5000},'10':{m:10000},'half':{m:21097.5},'full':{m:42195}};
var PREDS=[
  {l:'1500m',        m:1500},
  {l:'3000m',        m:3000},
  {l:'5 km',         m:5000},
  {l:'10 km',        m:10000},
  {l:'15 km',        m:15000},
  {l:'20 km',        m:20000},
  {l:'1/2 Marathon', m:21097.5},
  {l:'25 km',        m:25000},
  {l:'30 km',        m:30000},
  {l:'Marathon',     m:42195}
];
var curRef='5';
function setRef(k){
  curRef=k;
  ['5','10','half','full'].forEach(function(id){
    document.getElementById('rb-'+id).classList.toggle('active',id===k);
  });
  calcPredict();
}
function calcPredict(){
  var h=parseInt(document.getElementById('inp-h').value)||0;
  var m=parseInt(document.getElementById('inp-m').value)||0;
  var s=parseInt(document.getElementById('inp-s').value)||0;
  var refSec=h*3600+m*60+s;
  var body=document.getElementById('pred-body');
  if(refSec<10){body.innerHTML='';return;}
  var vd=getVdot(REFS[curRef].m,refSec);
  var html='';
  PREDS.forEach(function(d){
    var predSec=predictSec(vd,d.m);
    var paceSec=predSec/(d.m/1000);
    html+='<div class="pred-tr">'+
      '<div class="pred-td dist">'+d.l+'</div>'+
      '<div class="pred-td time">'+ft(predSec)+'</div>'+
      '<div class="pred-td pace">'+fp(paceSec)+'</div>'+
    '</div>';
  });
  body.innerHTML=html;
}
calcPredict();

/* =============== PAGE 3 : WORKOUT =============== */
var nbBlocks=3;
function changeBlocks(delta){
  nbBlocks=Math.max(1,Math.min(20,nbBlocks+delta));
  document.getElementById('bc-val').textContent=nbBlocks;
  renderBlocks();
}
function renderBlocks(){
  var c=document.getElementById('wb-container');
  /* preserve existing values */
  var prev=[];
  c.querySelectorAll('.workout-block').forEach(function(b){
    prev.push({
      dist:b.querySelector('.wb-dist').value,
      pm:b.querySelector('.wb-pm').value,
      ps:b.querySelector('.wb-ps').value
    });
  });
  var html='';
  for(var i=0;i<nbBlocks;i++){
    var dv=prev[i]?prev[i].dist:'';
    var mv=prev[i]?prev[i].pm:'';
    var sv=prev[i]?prev[i].ps:'';
    html+='<div class="workout-block">'+
      '<div class="wb-num">'+(i+1)+'</div>'+
      '<div class="wb-field"><label>Dist km</label><input type="text" class="wb-input wb-dist" placeholder="5.0" value="'+dv+'" oninput="calcWorkout()"></div>'+
      '<div class="wb-field"><label>Allure</label>'+
        '<input type="text" class="wb-input wb-input-sm wb-pm" placeholder="4" value="'+mv+'" oninput="calcWorkout()">'+
        '<span class="wb-sep">:</span>'+
        '<input type="text" class="wb-input wb-input-sm wb-ps" placeholder="30" value="'+sv+'" oninput="calcWorkout()">'+
      '</div>'+
      '<div class="wb-time" id="wbt-'+i+'">—</div>'+
    '</div>';
  }
  c.innerHTML=html;
  calcWorkout();
}
function calcWorkout(){
  var blocks=document.querySelectorAll('.workout-block');
  var totalSec=0,totalDist=0;
  blocks.forEach(function(b,i){
    var distRaw=b.querySelector('.wb-dist').value.replace(',','.');
    var dist=parseFloat(distRaw)||0;
    var pm=parseInt(b.querySelector('.wb-pm').value)||0;
    var pSec=parseInt(b.querySelector('.wb-ps').value)||0;
    var paceTotal=pm*60+pSec;
    var el=document.getElementById('wbt-'+i);
    if(dist>0&&paceTotal>0){
      var sec=dist*paceTotal;
      totalSec+=sec;totalDist+=dist;
      el.textContent=ft(sec);
    }else{
      el.textContent='—';
    }
  });
  document.getElementById('ws-time').textContent=totalSec>0?ft(totalSec):"0'00\"";
  document.getElementById('ws-dist').textContent=totalDist>0?totalDist.toFixed(1)+' km':'0.0 km';
  if(totalDist>0&&totalSec>0){
    var avgPace=totalSec/totalDist;
    document.getElementById('ws-pace').textContent=fp(avgPace)+' /km';
  }else{
    document.getElementById('ws-pace').textContent='—';
  }
}
renderBlocks();
</script>
</body>
</html>
