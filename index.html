
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<!-- Google tag (gtag.js) -->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pace Me App</title>
<style>
:root{--bg:#1a1a1a;--surface:#222;--border:#2e2e2e;--bl:#383838;--text:#f0f0f0;--muted:#555;--muted2:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Helvetica,Arial,sans-serif;min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:40px 28px 60px}
header{margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{font-size:18px;color:#fff;letter-spacing:.04em;white-space:nowrap}
.brand em{font-style:normal;color:#fff}
.tabs{display:flex;border:1px solid var(--bl);border-radius:3px;overflow:hidden;flex-shrink:0}
.tab{padding:7px 14px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:var(--muted2);border:none;cursor:pointer;transition:all .15s;font-family:Helvetica,Arial,sans-serif}
.tab.active{background:var(--bl);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.page{display:none}
.page.active{display:block}

/* PAGE 1 */
.pace-control{margin-bottom:28px}
.pace-row{display:flex;align-items:baseline;gap:16px;margin-bottom:16px}
.pace-value{font-size:68px;color:#fff;line-height:1;letter-spacing:-.02em}
.pace-meta{display:flex;flex-direction:column;gap:4px;padding-bottom:4px}
.pace-unit{font-size:12px;color:#fff;letter-spacing:.15em}
.pace-speed{font-size:15px;color:#fff;letter-spacing:.02em}
.slider-row{display:flex;align-items:center;gap:12px}
.btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--bl);background:transparent;color:var(--muted2);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;font-family:Helvetica,Arial,sans-serif}
.btn:hover{border-color:#555;color:var(--text)}
.btn:active{transform:scale(.9)}
.slider-wrap{flex:1}
input[type=range]{-webkit-appearance:none;width:100%;height:1px;background:linear-gradient(90deg,#d0d0d0 var(--pct,0%),var(--bl) var(--pct,0%));outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:grab;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.25)}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px;letter-spacing:.08em}
.splits-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 1px;background:var(--border);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.splits-col{background:var(--surface)}
.col-header{display:flex;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.split-row{display:flex;justify-content:space-between;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.split-row:last-child{border-bottom:none}
.split-row:hover{background:rgba(255,255,255,.03)}
.split-dist{font-size:13px;color:var(--muted2);letter-spacing:.02em}
.split-time{font-size:14px;color:var(--text);letter-spacing:.04em}
.split-row.key .split-dist{color:#999}
.split-row.key .split-time{color:#fff}
.split-row.race .split-dist{color:#999}
.split-row.race .split-time{color:#fff}

.custom-dist-block{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.custom-dist-block label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.custom-dist-input{background:var(--bg);border:1px solid var(--bl);color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:20px;width:90px;text-align:center;padding:8px 6px;border-radius:3px;-moz-appearance:textfield}
.custom-dist-input::-webkit-inner-spin-button,.custom-dist-input::-webkit-outer-spin-button{-webkit-appearance:none}
.custom-dist-input:focus{outline:none;border-color:#888}
.custom-dist-unit{font-size:14px;color:var(--muted2)}
.custom-dist-result{font-size:20px;color:#fff;letter-spacing:.02em;margin-left:auto}

/* PAGE 2 */
.pred-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.ref-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:24px}
.ref-btn{background:var(--surface);border:none;padding:16px 8px;text-align:center;cursor:pointer;transition:background .15s;font-family:Helvetica,Arial,sans-serif;color:#fff;font-size:15px}
.ref-btn:hover{background:var(--bl)}
.ref-btn.active{background:var(--bl)}
.time-block{margin-bottom:24px}
.time-fields{display:flex;align-items:center;gap:8px}
input[type=number]{background:var(--surface);border:1px solid var(--bl);color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:28px;width:62px;text-align:center;padding:8px 4px;border-radius:3px;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{outline:none;border-color:#888}
.time-sep{font-size:28px;color:var(--muted2)}
.method-note{font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:20px}
.pred-table{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.pred-thead{display:grid;grid-template-columns:1.2fr 1fr 1fr;background:var(--bg);border-bottom:1px solid var(--border)}
.pred-th{padding:10px 20px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.pred-tr{display:grid;grid-template-columns:1.2fr 1fr 1fr;border-bottom:1px solid var(--border);transition:background .1s}
.pred-tr:last-child{border-bottom:none}
.pred-tr:hover{background:rgba(255,255,255,.03)}
.pred-td{padding:11px 20px;font-size:13px;letter-spacing:.04em}
.pred-td.dist{font-size:12px;color:var(--muted2)}
.pred-td.time{color:var(--text)}
.pred-td.pace{font-size:12px;color:var(--muted2)}

/* PAGE 3 - BLOCS */
.workout-summary{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:20px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px}
.summary-item{text-align:center}
.summary-val{font-size:32px;color:#fff;letter-spacing:-.01em;line-height:1.2}
.summary-lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:4px}

.chart-area{background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:24px;overflow:hidden}
.chart-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.chart-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.chart-toggle{display:flex;border:1px solid var(--bl);border-radius:3px;overflow:hidden}
.chart-toggle button{padding:4px 12px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--muted2);border:none;cursor:pointer;font-family:Helvetica,Arial,sans-serif;transition:all .15s}
.chart-toggle button.active{background:var(--bl);color:#fff}
.chart-toggle button:hover:not(.active){color:var(--text)}
.chart-canvas-wrap{padding:16px 20px 12px;position:relative;height:180px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}

.blocks-control{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.add-block-btn{padding:6px 16px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1px solid var(--bl);border-radius:3px;color:var(--muted2);cursor:pointer;font-family:Helvetica,Arial,sans-serif;transition:all .15s}
.add-block-btn:hover{border-color:#555;color:var(--text)}

.workout-blocks{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.workout-block{background:var(--surface);display:flex;align-items:stretch;border-bottom:1px solid var(--border);transition:background .15s}
.workout-block:last-child{border-bottom:none}
.workout-block:hover{background:rgba(255,255,255,.015)}
.wb-num{padding:0 12px;font-size:11px;color:var(--muted);letter-spacing:.08em;min-width:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.wb-mode{display:flex;flex-direction:column;border-left:1px solid var(--border);flex-shrink:0}
.wb-mode button{flex:1;padding:0 9px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--muted);border:none;cursor:pointer;font-family:Helvetica,Arial,sans-serif;transition:all .12s;line-height:1}
.wb-mode button.active{color:#fff;background:var(--bl)}
.wb-mode button:first-child{border-bottom:1px solid var(--border)}

.wb-fields{display:flex;align-items:center;gap:6px;padding:8px 12px;border-left:1px solid var(--border);flex:1;min-width:0}
.wb-fields label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex-shrink:0}
.wb-input{background:var(--bg);border:1px solid var(--bl);color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:15px;width:54px;text-align:center;padding:5px 3px;border-radius:3px;-moz-appearance:textfield;flex-shrink:0}
.wb-input::-webkit-inner-spin-button,.wb-input::-webkit-outer-spin-button{-webkit-appearance:none}
.wb-input:focus{outline:none;border-color:#888}
.wb-input-sm{width:32px}
.wb-sep{font-size:15px;color:var(--muted2);flex-shrink:0}
.wb-time{padding:8px 10px;border-left:1px solid var(--border);font-size:13px;color:#fff;letter-spacing:.04em;display:flex;align-items:center;justify-content:flex-end;min-width:86px;flex-shrink:0}
.wb-actions{display:flex;flex-shrink:0;border-left:1px solid var(--border)}
.wb-actions button{padding:0 9px;background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:13px;transition:all .12s;font-family:Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center}
.wb-actions button:hover{color:var(--text);background:rgba(255,255,255,.04)}
.wb-actions button+button{border-left:1px solid var(--border)}
.wb-actions svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

@keyframes fn{0%{opacity:.3}100%{opacity:1}}
.flash{animation:fn .2s ease}

@media(max-width:600px){
  .container{padding:24px 10px 40px}
  .pace-value{font-size:52px}
  .col-header{padding:8px 10px;font-size:8px;letter-spacing:.1em}
  .split-row{padding:9px 10px}
  .split-dist,.split-time{font-size:11px}
  .ref-grid{grid-template-columns:repeat(2,1fr)}
  .pred-thead,.pred-tr{grid-template-columns:1fr 1fr 1fr}
  .pred-th{padding:8px 8px;font-size:8px;letter-spacing:.08em}
  .pred-td{padding:9px 8px;font-size:11px}
  .pred-td.dist,.pred-td.pace{font-size:10px}
  header{flex-direction:column;align-items:flex-start;gap:12px}
  input[type=number]{font-size:22px;width:52px;padding:6px 2px}
  .time-sep{font-size:22px}
  .custom-dist-block{padding:14px;gap:10px}
  .custom-dist-input{font-size:16px;width:72px}
  .custom-dist-result{font-size:16px;margin-left:0}
  .wb-input{font-size:13px;width:44px;padding:4px 2px}
  .wb-input-sm{width:28px;font-size:13px}
  .wb-num{padding:0 6px;min-width:26px;font-size:9px}
  .wb-time{padding:6px 6px;font-size:11px;min-width:64px}
  .wb-fields{padding:6px 6px;gap:4px}
  .wb-fields label{font-size:7px}
  .wb-mode button{padding:0 6px;font-size:7px}
  .wb-actions button{padding:0 6px}
  .wb-actions svg{width:12px;height:12px}
  .summary-val{font-size:24px}
  .tabs{flex-wrap:wrap}
  .tab{padding:7px 10px;font-size:10px;letter-spacing:.08em}
  .chart-canvas-wrap{height:140px;padding:12px 10px 8px}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">Pace Me App <em> / Built by Tom N.</em></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('splits')">Splits</button>
      <button class="tab" onclick="showTab('predict')">Predict</button>
      <button class="tab" onclick="showTab('blocs')">Blocs</button>
    </div>
  </header>

  <!-- PAGE 1 : SPLITS -->
  <div id="page-splits" class="page active">
    <div class="pace-control">
      <div class="pace-row">
        <div class="pace-value" id="pd">4:00</div>
        <div class="pace-meta">
          <div class="pace-unit">min/km</div>
          <div class="pace-speed" id="ps">15.0km/h</div>
        </div>
      </div>
      <div class="slider-row">
        <button class="btn" id="bm">&#8722;</button>
        <div class="slider-wrap">
          <input type="range" id="sl" min="150" max="360" value="240" step="1">
          <div class="range-labels"><span>2:30 /km</span><span>6:00 /km</span></div>
        </div>
        <button class="btn" id="bp">&#43;</button>
      </div>
    </div>
    <div class="splits-grid">
      <div class="splits-col">
        <div class="col-header"><span>Distance</span><span>Split</span></div>
        <div id="cL"></div>
      </div>
      <div class="splits-col">
        <div class="col-header"><span>Distance</span><span>Split</span></div>
        <div id="cR"></div>
      </div>
    </div>
    <div class="custom-dist-block">
      <label>Custom</label>
      <input type="text" class="custom-dist-input" id="custom-km" placeholder="12.5" oninput="updCustom()">
      <span class="custom-dist-unit">km</span>
      <div class="custom-dist-result" id="custom-result">—</div>
    </div>
  </div>

  <!-- PAGE 2 : PREDICT -->
  <div id="page-predict" class="page">
    <div class="pred-label">Reference distance</div>
    <div class="ref-grid">
      <button class="ref-btn active" id="rb-5" onclick="setRef('5')">5km</button>
      <button class="ref-btn" id="rb-10" onclick="setRef('10')">10km</button>
      <button class="ref-btn" id="rb-half" onclick="setRef('half')">1/2 Marathon</button>
      <button class="ref-btn" id="rb-full" onclick="setRef('full')">Marathon</button>
    </div>
    <div class="pred-label">Your reference time</div>
    <div class="time-block">
      <div class="time-fields">
        <input type="number" id="inp-h" min="0" max="9" value="0" oninput="calcPredict()">
        <span class="time-sep">h</span>
        <input type="number" id="inp-m" min="0" max="59" value="25" oninput="calcPredict()">
        <span class="time-sep">m</span>
        <input type="number" id="inp-s" min="0" max="59" value="0" oninput="calcPredict()">
        <span class="time-sep">s</span>
      </div>
    </div>
    <div class="method-note">Predictions based on Jack Daniels vDot method</div>
    <div class="pred-table">
      <div class="pred-thead">
        <div class="pred-th">Distance</div>
        <div class="pred-th">Estimated Time</div>
        <div class="pred-th">min/km</div>
      </div>
      <div id="pred-body"></div>
    </div>
  </div>

  <!-- PAGE 3 : BLOCS -->
  <div id="page-blocs" class="page">
    <div class="workout-summary">
      <div class="summary-item">
        <div class="summary-val" id="ws-time">0'00"</div>
        <div class="summary-lbl">Time</div>
      </div>
      <div class="summary-item">
        <div class="summary-val" id="ws-dist">0.0km</div>
        <div class="summary-lbl">Distance</div>
      </div>
      <div class="summary-item">
        <div class="summary-val" id="ws-pace">—</div>
        <div class="summary-lbl">Average pace</div>
      </div>
    </div>

    <div class="chart-area" id="chart-area" style="display:none">
      <div class="chart-header">
        <span class="chart-title">Profil de séance</span>
        <div class="chart-toggle" id="chart-toggle">
          <button class="active" onclick="setChartX('dist',this)">Distance</button>
          <button onclick="setChartX('time',this)">Temps</button>
        </div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="chart-cv"></canvas>
      </div>
    </div>

    <div class="blocks-control">
      <button class="add-block-btn" onclick="addBlock()">+ Add a bloc</button>
    </div>

    <div class="workout-blocks" id="wb-container"></div>
  </div>
</div>

<script>
/* ---- Utilities ---- */
function ft(s){
  s=Math.round(s);
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h>0) return h+'h'+String(m).padStart(2,'0')+"'"+String(sc).padStart(2,'0')+'"';
  return m+"'"+String(sc).padStart(2,'0')+'"';
}
function fp(s){
  var m=Math.floor(s/60),sc=Math.round(s%60);
  if(sc===60){m++;sc=0;}
  return m+':'+String(sc).padStart(2,'0');
}
function showTab(name){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.remove('active');
    if(t.getAttribute('onclick').indexOf("'"+name+"'")>-1) t.classList.add('active');
  });
  document.getElementById('page-'+name).classList.add('active');
}

/* =============== PAGE 1 : SPLITS =============== */
var LD=[
  {l:'100m',m:100},{l:'200m',m:200},{l:'300m',m:300},
  {l:'400m',m:400,c:'key'},{l:'500m',m:500},{l:'600m',m:600},
  {l:'800m',m:800,c:'key'},{l:'1200m',m:1200},{l:'1400m',m:1400},
  {l:'1500m',m:1500,c:'key'},{l:'1600m',m:1600,c:'key'},{l:'1800m',m:1800}
];
var RD=[
  {l:'2km',m:2000},{l:'3km',m:3000},{l:'4km',m:4000},
  {l:'5km',m:5000,c:'key'},{l:'10km',m:10000,c:'race'},
  {l:'15km',m:15000,c:'race'},{l:'20km',m:20000,c:'race'},
  {l:'1/2 Marathon',m:21097.5,c:'race'},{l:'25km',m:25000,c:'race'},
  {l:'30km',m:30000,c:'race'},{l:'35km',m:35000,c:'race'},
  {l:'40km',m:40000,c:'race'},{l:'Marathon',m:42195,c:'race'}
];
var sl=document.getElementById('sl'),pd=document.getElementById('pd'),ps=document.getElementById('ps');
function bc(el,dists,pace){
  el.innerHTML=dists.map(function(d){
    return '<div class="split-row '+(d.c||'')+'"><span class="split-dist">'+d.l+'</span><span class="split-time">'+ft((pace/1000)*d.m)+'</span></div>';
  }).join('');
}
function upd(){
  var s=parseInt(sl.value);
  sl.style.setProperty('--pct',((s-150)/(360-150)*100)+'%');
  pd.textContent=fp(s);pd.classList.remove('flash');void pd.offsetWidth;pd.classList.add('flash');
  ps.textContent=(3600/s).toFixed(1)+'km/h';
  bc(document.getElementById('cL'),LD,s);bc(document.getElementById('cR'),RD,s);
  updCustom();
}
function updCustom(){
  var km=parseFloat(document.getElementById('custom-km').value.replace(',','.'));
  var el=document.getElementById('custom-result');
  if(!km||km<=0){el.textContent='—';return;}
  el.textContent=ft(parseInt(sl.value)*km);
}
sl.addEventListener('input',upd);
document.getElementById('bm').addEventListener('click',function(){if(+sl.value>+sl.min){sl.value=+sl.value-1;upd();}});
document.getElementById('bp').addEventListener('click',function(){if(+sl.value<+sl.max){sl.value=+sl.value+1;upd();}});
document.addEventListener('keydown',function(e){
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
  if(e.key==='ArrowLeft'||e.key==='ArrowDown'){if(+sl.value>+sl.min){sl.value=+sl.value-1;upd();}}
  if(e.key==='ArrowRight'||e.key==='ArrowUp'){if(+sl.value<+sl.max){sl.value=+sl.value+1;upd();}}
});
upd();

/* =============== PAGE 2 : PREDICT =============== */
function vo2(v){return -4.60+0.182258*v+0.000104*v*v;}
function frac(t){return 0.8+0.1894393*Math.exp(-0.012778*t)+0.2989558*Math.exp(-0.1932605*t);}
function getVdot(dM,tS){var t=tS/60,v=dM/t;return vo2(v)/frac(t);}
function predictSec(vd,dM){var lo=0.5,hi=600;for(var i=0;i<80;i++){var mid=(lo+hi)/2,v=dM/mid;if(vo2(v)/frac(mid)>vd)lo=mid;else hi=mid;}return Math.round((lo+hi)/2*60);}
var REFS={'5':{m:5000},'10':{m:10000},'half':{m:21097.5},'full':{m:42195}};
var PREDS=[{l:'1500m',m:1500},{l:'3000m',m:3000},{l:'5km',m:5000},{l:'10km',m:10000},{l:'15km',m:15000},{l:'20km',m:20000},{l:'1/2 Marathon',m:21097.5},{l:'25km',m:25000},{l:'30km',m:30000},{l:'Marathon',m:42195}];
var curRef='5';
function setRef(k){curRef=k;['5','10','half','full'].forEach(function(id){document.getElementById('rb-'+id).classList.toggle('active',id===k);});calcPredict();}
function calcPredict(){
  var h=parseInt(document.getElementById('inp-h').value)||0,m=parseInt(document.getElementById('inp-m').value)||0,s=parseInt(document.getElementById('inp-s').value)||0;
  var refSec=h*3600+m*60+s,body=document.getElementById('pred-body');
  if(refSec<10){body.innerHTML='';return;}
  var vd=getVdot(REFS[curRef].m,refSec),html='';
  PREDS.forEach(function(d){var pS=predictSec(vd,d.m),pP=pS/(d.m/1000);
    html+='<div class="pred-tr"><div class="pred-td dist">'+d.l+'</div><div class="pred-td time">'+ft(pS)+'</div><div class="pred-td pace">'+fp(pP)+'</div></div>';
  });body.innerHTML=html;
}
calcPredict();

/* =============== PAGE 3 : BLOCS =============== */
var SVG_DUP='<svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V6a2 2 0 0 1 2-2h10"/></svg>';
var SVG_DEL='<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

var blocks=[
  {mode:'dist',dist:'',pm:'',ps:'',durM:'',durS:''},
  {mode:'dist',dist:'',pm:'',ps:'',durM:'',durS:''},
  {mode:'dist',dist:'',pm:'',ps:'',durM:'',durS:''}
];

function newBlock(){return {mode:'dist',dist:'',pm:'',ps:'',durM:'',durS:''};}
function addBlock(){blocks.push(newBlock());renderBlocks();}

function dupBlock(i){
  saveInputs();
  blocks.splice(i+1,0,JSON.parse(JSON.stringify(blocks[i])));
  renderBlocks();
}
function delBlock(i){
  if(blocks.length<=1)return;
  saveInputs();
  blocks.splice(i,1);
  renderBlocks();
}
function setBlockMode(i,mode){
  saveInputs();
  blocks[i].mode=mode;
  renderBlocks();
}

function saveInputs(){
  var els=document.querySelectorAll('.workout-block');
  els.forEach(function(el,i){
    if(!blocks[i])return;
    var b=blocks[i];
    if(b.mode==='dist'){
      var d=el.querySelector('.wb-dist');if(d)b.dist=d.value;
    }else{
      var dm=el.querySelector('.wb-durm');if(dm)b.durM=dm.value;
      var ds=el.querySelector('.wb-durs');if(ds)b.durS=ds.value;
    }
    var pm=el.querySelector('.wb-pm');if(pm)b.pm=pm.value;
    var pss=el.querySelector('.wb-ps');if(pss)b.ps=pss.value;
  });
}

function renderBlocks(){
  var c=document.getElementById('wb-container');
  var html='';
  blocks.forEach(function(b,i){
    var isDist=b.mode==='dist';
    html+='<div class="workout-block">';
    html+='<div class="wb-num">'+(i+1)+'</div>';
    html+='<div class="wb-mode">';
    html+='<button class="'+(isDist?'active':'')+'" onclick="setBlockMode('+i+',\'dist\')">km</button>';
    html+='<button class="'+(!isDist?'active':'')+'" onclick="setBlockMode('+i+',\'time\')">min</button>';
    html+='</div>';
    if(isDist){
      html+='<div class="wb-fields"><label>Dist</label><input type="text" class="wb-input wb-dist" placeholder="5.0" value="'+(b.dist||'')+'" oninput="calcWorkout()"><span class="wb-sep" style="font-size:10px;color:var(--muted)">km</span></div>';
    }else{
      html+='<div class="wb-fields"><label>Durée</label>';
      html+='<input type="text" class="wb-input wb-input-sm wb-durm" placeholder="20" value="'+(b.durM||'')+'" oninput="calcWorkout()">';
      html+='<span class="wb-sep">:</span>';
      html+='<input type="text" class="wb-input wb-input-sm wb-durs" placeholder="00" value="'+(b.durS||'')+'" oninput="calcWorkout()">';
      html+='</div>';
    }
    html+='<div class="wb-fields"><label>Allure</label>';
    html+='<input type="text" class="wb-input wb-input-sm wb-pm" placeholder="4" value="'+(b.pm||'')+'" oninput="calcWorkout()">';
    html+='<span class="wb-sep">:</span>';
    html+='<input type="text" class="wb-input wb-input-sm wb-ps" placeholder="30" value="'+(b.ps||'')+'" oninput="calcWorkout()">';
    html+='<span class="wb-sep" style="font-size:10px;color:var(--muted)">/km</span>';
    html+='</div>';
    html+='<div class="wb-time" id="wbt-'+i+'">—</div>';
    html+='<div class="wb-actions">';
    html+='<button title="Dupliquer" onclick="dupBlock('+i+')">'+SVG_DUP+'</button>';
    if(blocks.length>1) html+='<button title="Supprimer" onclick="delBlock('+i+')">'+SVG_DEL+'</button>';
    html+='</div>';
    html+='</div>';
  });
  c.innerHTML=html;
  calcWorkout();
}

var chartXMode='dist';
function setChartX(mode,btn){
  chartXMode=mode;
  document.getElementById('chart-toggle').querySelectorAll('button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  drawChart();
}

function calcWorkout(){
  saveInputs();
  var totalSec=0,totalDist=0;
  var computed=[];

  blocks.forEach(function(b,i){
    var pm=parseInt(b.pm)||0;
    var pSec=parseInt(b.ps)||0;
    var paceTotal=pm*60+pSec;
    var el=document.getElementById('wbt-'+i);
    var sec=0,dist=0;

    if(b.mode==='dist'){
      dist=parseFloat((b.dist||'').replace(',','.'))||0;
      if(dist>0&&paceTotal>0){
        sec=dist*paceTotal;
        if(el)el.textContent=ft(sec);
      }else{if(el)el.textContent='—';}
    }else{
      var dm=parseInt(b.durM)||0,ds=parseInt(b.durS)||0;
      sec=dm*60+ds;
      if(sec>0&&paceTotal>0){
        dist=sec/paceTotal;
        if(el)el.textContent=dist.toFixed(2)+'km';
      }else{if(el)el.textContent='—';}
    }
    if(sec>0&&dist>0){
      totalSec+=sec;totalDist+=dist;
      computed.push({sec:sec,dist:dist,pace:paceTotal,idx:i});
    }
  });

  document.getElementById('ws-time').textContent=totalSec>0?ft(totalSec):"0'00\"";
  document.getElementById('ws-dist').textContent=totalDist>0?totalDist.toFixed(1)+'km':'0.0km';
  document.getElementById('ws-pace').textContent=(totalDist>0&&totalSec>0)?fp(totalSec/totalDist)+' /km':'—';

  window._computedBlocks=computed;
  document.getElementById('chart-area').style.display=computed.length>=1?'block':'none';
  if(computed.length>=1)drawChart();
}

/* ---- Chart ---- */
function drawChart(){
  var data=window._computedBlocks||[];
  var canvas=document.getElementById('chart-cv');
  var wrap=canvas.parentNode;
  var W=wrap.clientWidth,H=wrap.clientHeight;
  if(W===0||H===0)return;
  var dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(data.length===0)return;

  var paces=data.map(function(d){return d.pace;});
  var minP=Math.min.apply(null,paces),maxP=Math.max.apply(null,paces);
  var rangeP=maxP-minP||1;

  /* color: fast=orange, slow=green */
  function paceColor(p){
    var t=(p-minP)/rangeP; /* 0=fastest 1=slowest */
    /* orange rgb(215,150,75) → green rgb(110,190,110) */
    var r=Math.round(215-105*t);
    var g=Math.round(150+40*t);
    var b=Math.round(75+35*t);
    return 'rgb('+r+','+g+','+b+')';
  }

  var segments=[];var cumX=0;
  data.forEach(function(d){
    var xLen=chartXMode==='dist'?d.dist:d.sec;
    segments.push({x0:cumX,x1:cumX+xLen,pace:d.pace,color:paceColor(d.pace)});
    cumX+=xLen;
  });
  var totalX=cumX;

  var padL=44,padR=14,padT=20,padB=28;
  var cW=W-padL-padR,cH=H-padT-padB;
  var yPad=15;
  var yMin=minP-yPad,yMax=maxP+yPad;
  if(yMin===yMax){yMin-=30;yMax+=30;}

  function mapX(v){return padL+(v/totalX)*cW;}
  function mapY(p){return padT+((p-yMin)/(yMax-yMin))*cH;}

  /* grid */
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  for(var g=0;g<=3;g++){
    var gy=padT+(cH/3)*g;
    ctx.beginPath();ctx.moveTo(padL,gy);ctx.lineTo(W-padR,gy);ctx.stroke();
  }

  /* bars */
  segments.forEach(function(s,si){
    var x0=mapX(s.x0),x1=mapX(s.x1);
    var yTop=mapY(s.pace);
    var yBottom=padT+cH;
    var bw=x1-x0;
    var gap=Math.min(2,bw*0.08);

    var grad=ctx.createLinearGradient(0,yTop,0,yBottom);
    grad.addColorStop(0,s.color);
    grad.addColorStop(1,s.color.replace('rgb','rgba').replace(')',',0.08)'));
    ctx.fillStyle=grad;

    var r=Math.min(4,bw/2);
    var lx=x0+gap,rx=x1-gap;
    ctx.beginPath();
    ctx.moveTo(lx,yBottom);
    ctx.lineTo(lx,yTop+r);
    ctx.quadraticCurveTo(lx,yTop,lx+r,yTop);
    ctx.lineTo(rx-r,yTop);
    ctx.quadraticCurveTo(rx,yTop,rx,yTop+r);
    ctx.lineTo(rx,yBottom);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle=s.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(lx+r,yTop);ctx.lineTo(rx-r,yTop);ctx.stroke();

    /* pace label */
    if(bw>30){
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.font='600 '+(bw>50?'11':'9')+'px Helvetica,Arial,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(fp(s.pace),(x0+x1)/2,yTop-5);
    }
  });

  /* Y axis */
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='10px Helvetica,Arial,sans-serif';
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(var g=0;g<=3;g++){
    var pVal=yMin+((yMax-yMin)/3)*g;
    ctx.fillText(fp(pVal),padL-6,padT+(cH/3)*g);
  }

  /* X axis */
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='10px Helvetica,Arial,sans-serif';
  segments.forEach(function(s,i){
    var cx=(mapX(s.x0)+mapX(s.x1))/2;
    var label;
    if(chartXMode==='dist'){
      var km=data[i].dist;
      label=km>=1?km.toFixed(1)+'k':Math.round(km*1000)+'m';
    }else{
      label=ft(data[i].sec);
    }
    if((mapX(s.x1)-mapX(s.x0))>25) ctx.fillText(label,cx,padT+cH+6);
  });

  /* baseline */
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,padT+cH);ctx.lineTo(W-padR,padT+cH);ctx.stroke();
}

renderBlocks();
var _ro=new ResizeObserver(function(){drawChart();});
_ro.observe(document.querySelector('.chart-canvas-wrap'));
</script>
